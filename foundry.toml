[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
via_ir = true
optimizer = true

fs_permissions = [{ access = "read", path = "chainlink-functions" }, { access = "read-write", path = "deployments" }]

[profile.ci]
solc = "0.8.24"

[profile.slither]
solc = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200

# [profile.coverage]
# Not needed — `forge coverage --ir-minimum` works after the PositionModule.t.sol
# stack-depth refactor (LocalEnv struct + Contest helper functions).

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
