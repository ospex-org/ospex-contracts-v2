name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Fix missing submodules
        run: |
          git submodule add --force https://github.com/smartcontractkit/chainlink lib/chainlink
          git submodule add --force https://github.com/smartcontractkit/foundry-chainlink-toolkit lib/foundry-chainlink-toolkit
          git submodule add --force https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts
          git submodule update --init --recursive

      - name: Verify dependencies
        run: |
          echo "Contents of lib after fix:"
          ls -la lib/
          echo "Check openzeppelin-contracts:"
          ls -la lib/openzeppelin-contracts/contracts/token/ERC20/ || echo "Still missing"

      - name: Run Forge build
        run: |
          forge build --via-ir --optimize --sizes