name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Debug - Check what's in lib
        run: |
          echo "Contents of lib folder:"
          ls -la lib/ || echo "lib folder doesn't exist"
          echo "Current directory:"
          pwd
          echo "Contents of current directory:"
          ls -la

      - name: Debug - Check .gitmodules
        run: |
          echo "Contents of .gitmodules:"
          cat .gitmodules || echo ".gitmodules doesn't exist"

      - name: Debug - Check foundry.toml
        run: |
          echo "Contents of foundry.toml:"
          cat foundry.toml || echo "foundry.toml doesn't exist"

      - name: Install dependencies
        run: |
          forge install

      - name: Debug - Check lib after install
        run: |
          echo "Contents of lib after forge install:"
          ls -la lib/
          echo "Check if openzeppelin-contracts exists:"
          ls -la lib/openzeppelin-contracts/ || echo "openzeppelin-contracts not found"

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge build
        run: |
          forge build --via-ir --optimize --sizes
        id: build