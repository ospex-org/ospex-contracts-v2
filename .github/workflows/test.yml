name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Clone exact dependencies directly
        run: |
          # Remove any existing lib directories except forge-std
          rm -rf lib/chainlink lib/foundry-chainlink-toolkit lib/openzeppelin-contracts
          
          # Clone chainlink directly to the exact commit you have locally
          git clone https://github.com/smartcontractkit/chainlink lib/chainlink
          cd lib/chainlink
          git checkout 0f769bbc0e
          cd ../..
          
          # Clone other dependencies
          git clone https://github.com/smartcontractkit/foundry-chainlink-toolkit lib/foundry-chainlink-toolkit
          git clone https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts

      - name: Verify dependencies are installed
        run: |
          echo "Verifying chainlink files exist:"
          ls -la lib/chainlink/contracts/src/v0.8/functions/v1_0_0/FunctionsClient.sol
          ls -la lib/chainlink/contracts/src/v0.8/functions/v1_0_0/libraries/FunctionsRequest.sol
          echo "Dependencies installed successfully!"

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge build
        run: |
          forge build --via-ir --optimize --sizes
        id: build

      - name: Run Forge tests
        run: |
          forge test -vvv --via-ir --optimize
        id: test